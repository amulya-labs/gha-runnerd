# Example Ansible inventory for gha-runnerd deployment.
#
# Organize hosts into groups based on their role or hardware.
# Each host can override variables to customize its runner configuration.
#
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml -e "github_token=..."

[runners]
# CPU-only build hosts
build-host-1  ansible_host=10.0.1.10  gha_host_label=build-1
build-host-2  ansible_host=10.0.1.11  gha_host_label=build-2

# GPU host (uncomment if applicable)
# gpu-host-1   ansible_host=10.0.1.20  gha_host_label=gpu-1  gha_runners='["gpu-max-1", "gpu-large-cuda-1"]'

[runners:vars]
# Common variables for all runner hosts
ansible_user=deploy
ansible_become=true

# GitHub settings
gha_github_org=your-org
gha_github_prefix=my
gha_github_scope=org
# gha_github_enterprise=your-enterprise  # for enterprise scope

# Default runner list (override per host with gha_runners)
gha_runners='["cpu-small-1", "cpu-small-2", "cpu-medium-1", "cpu-medium-docker-1"]'

# Runner user
gha_uid=1003
gha_gid=1003
